services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palladium-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Persist Caddy data (certificates, etc.)
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_HOST=${CADDY_HOST}
      - API_KEY=${API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # If running behind a firewall/NAT, ensure port 443 is reachable from the Internet

volumes:
  caddy_data:
  caddy_config: