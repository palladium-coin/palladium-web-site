services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palladium-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Persist Caddy data (certificates, etc.)
      - caddy_data:/data
      - caddy_config:/config
      # Expose ckpool logs read-only directly under /pool-data
      - ${POOL_LOG_DIR}:/srv/pool-data:ro
    environment:
      - CADDY_HOST=${CADDY_HOST}
      - API_KEY=${API_KEY}
    networks:
      - palladium-net
    # If running behind a firewall/NAT, ensure port 443 is reachable from the Internet

volumes:
  caddy_data:
  caddy_config:

networks:
  palladium-net:
    external: true
